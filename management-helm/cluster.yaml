apiVersion: bootstrap.cluster.x-k8s.io/v1beta1
kind: KubeadmConfigTemplate
metadata:
  name: hbang-proxmox-worker
  namespace: default
spec:
  template:
    spec:
      joinConfiguration:
        nodeRegistration:
          kubeletExtraArgs:
            provider-id: proxmox://'{{ ds.meta_data.instance_id }}'
      postKubeadmCommands:
        - |
          python3 -c "
          import yaml
          path = '/var/lib/kubelet/config.yaml'
          cfg = yaml.safe_load(open(path))
          cfg.setdefault('featureGates', {}).update({
            'KubeletCrashLoopBackOffMax': True,
          })
          open(path, 'w').write(yaml.dump(cfg))
          "
        - systemctl restart kubelet
      users:
        - name: root
          sshAuthorizedKeys:
          - "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAINq25Ui7pTHj6BA/hrxZYFpC+HQmJaubAsEXID6VA7JW ansible_key"
