---
- name: Bootstrap first K3s control-plane node (cluster init)
  hosts: servers[0]
  become: true
  vars:
    k3s_token: "SECRET"
  tasks:
    - name: Check if K3s is already installed
      stat:
        path: /usr/local/bin/k3s
      register: k3s_installed

    - name: Install initial K3s control-plane node
      when: not k3s_installed.stat.exists
      shell: |
        curl -sfL https://get.k3s.io | \
        K3S_TOKEN={{ k3s_token }} sh -s - \
          --flannel-backend=none \
          --disable-kube-proxy \
          --disable servicelb \
          --disable-network-policy \
          --disable traefik \
          --cluster-init
      args:
        creates: /usr/local/bin/k3s

    - name: Move kubeconfig to ~/.kube/config
      shell: |
        mkdir -p ~/.kube
        cp /etc/rancher/k3s/k3s.yaml ~/.kube/config
        chown $(id -u):$(id -g) ~/.kube/config
        chmod 600 ~/.kube/config
      args:
        creates: ~/.kube/config
      when: not k3s_installed.stat.exists

    - name: Register first control-plane IP
      when: not k3s_installed.stat.exists
      set_fact:
        controlplane_ip: "{{ ansible_host }}"

    - name: Share control-plane IP to all nodes
      add_host:
        name: "primary"
        ansible_host: "{{ ansible_host }}"
        controlplane_ip: "{{ ansible_host }}"

- name: Bootstrap additional K3s control-plane nodes
  hosts: servers[1:]
  become: true
  vars:
    k3s_token: "SECRET"
  tasks:
    - name: Check if K3s is already installed
      stat:
        path: /usr/local/bin/k3s
      register: k3s_installed

    - name: Wait for primary node fact to propagate
      wait_for:
        timeout: 10

    - name: Get first control-plane IP
      set_fact:
        controlplane_ip: "{{ hostvars['primary']['controlplane_ip'] | default(groups['servers'][0]) }}"

    - name: Install joining K3s control-plane node
      shell: |
        curl -sfL https://get.k3s.io | \
        K3S_TOKEN={{ k3s_token }} sh -s - \
          --flannel-backend=none \
          --disable-kube-proxy \
          --disable servicelb \
          --disable-network-policy \
          --disable traefik \
          --server https://{{ controlplane_ip }}:6443
      args:
        creates: /usr/local/bin/k3s

- name: Copy kubeconfig
  hosts: servers[0]
  become: true
  tasks:
    - name: Ensure .kube directory exists
      file:
        path: /root/.kube
        state: directory
        owner: root
        group: root
        mode: '0700'
    - name: Copy k3s kubeconfig
      copy:
        src: /etc/rancher/k3s/k3s.yaml
        dest: /root/.kube/config
        owner: root
        group: root
        mode: '0600'
        remote_src: true

- name: Install Cilium on first control-plane node
  hosts: servers[0]
  become: true
  vars:
    api_server_ip: "{{ ansible_host }}"
    api_server_port: 6443
  tasks:
    - name: Check if Cilium is already installed
      shell: "kubectl get pods -n kube-system -l k8s-app=cilium --no-headers 2>/dev/null | wc -l"
      register: cilium_check
      changed_when: false

    - name: Install Cilium CLI (if not installed)
      shell: |
        if ! command -v cilium >/dev/null 2>&1; then
          curl -L --remote-name-all https://github.com/cilium/cilium-cli/releases/latest/download/cilium-linux-amd64.tar.gz
          tar xzvf cilium-linux-amd64.tar.gz
          mv cilium /usr/local/bin/
        fi

    - name: Install Cilium CNI
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      shell: |
        cilium install \
          --set k8sServiceHost={{ api_server_ip }} \
          --set k8sServicePort={{ api_server_port }} \
          --set kubeProxyReplacement=true \
          --set bpf.masquerade=true \
          --set ipam.operator.clusterPoolIPv4PodCIDRList="172.16.0.0/16" \
          --set ipv4NativeRoutingCIDR="172.16.0.0/16" \
          --set autoDirectNodeRoutes="true" \
          --set routingMode="native" \
          --set bgpControlPlane.enabled="true"
      when: cilium_check.stdout | int == 0

- name: Install clusterctl
  hosts: servers[0]
  become: true
  tasks:
    - name: Check if clusterctl is already installed
      stat:
        path: /usr/local/bin/clusterctl
      register: clusterctl_installed

    - name: Install clusterctl
      shell: |
        curl -L https://github.com/kubernetes-sigs/cluster-api/releases/latest/download/clusterctl-linux-amd64 \
          -o /usr/local/bin/clusterctl
        chmod +x /usr/local/bin/clusterctl
      when: not clusterctl_installed.stat.exists

    - name: Ensure clusterctl config directory exists
      file:
        path: /root/.cluster-api
        state: directory
        mode: '0700'

    - name: Write clusterctl config with custom providers
      copy:
        dest: /root/.cluster-api/clusterctl.yaml
        mode: '0600'
        content: |
          providers:
            - name: proxmox
              url: https://github.com/ionos-cloud/cluster-api-provider-proxmox/releases/latest/infrastructure-components.yaml
              type: InfrastructureProvider
            - name: kamaji
              url: https://github.com/clastix/cluster-api-control-plane-provider-kamaji/releases/latest/control-plane-components.yaml
              type: ControlPlaneProvider

    - name: Initialize CAPI providers
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      shell: |
        clusterctl init \
          --core cluster-api \
          --bootstrap kubeadm \
          --control-plane kamaji \
          --infrastructure proxmox \
          --ipam in-cluster
      register: clusterctl_init
      failed_when: clusterctl_init.rc != 0 and 'already installed' not in clusterctl_init.stderr

- name: Install Helm
  hosts: servers[0]
  become: true
  tasks:
    - name: Check if Helm is already installed
      stat:
        path: /usr/local/bin/helm
      register: helm_installed

    - name: Install Helm
      shell: curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
      when: not helm_installed.stat.exists

- name: Install cert-manager
  hosts: servers[0]
  become: true
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  tasks:
    - name: Check if cert-manager is already installed
      shell: helm status cert-manager -n cert-manager 2>/dev/null
      register: certmanager_check
      failed_when: false
      changed_when: false

    - name: Add cert-manager Helm repo
      shell: helm repo add jetstack https://charts.jetstack.io && helm repo update
      when: certmanager_check.rc != 0

    - name: Install cert-manager
      shell: |
        helm install cert-manager jetstack/cert-manager \
          --namespace cert-manager \
          --create-namespace \
          --set crds.enabled=true \
          --wait
      when: certmanager_check.rc != 0

- name: Install Kamaji
  hosts: servers[0]
  become: true
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  tasks:
    - name: Check if Kamaji is already installed
      shell: helm status kamaji -n kamaji-system 2>/dev/null
      register: kamaji_check
      failed_when: false
      changed_when: false

    - name: Add Kamaji Helm repo
      shell: helm repo add clastix https://clastix.github.io/charts && helm repo update
      when: kamaji_check.rc != 0

    - name: Annotate existing DataStore if present
      shell: |
        kubectl annotate datastore default \
          meta.helm.sh/release-name=kamaji \
          meta.helm.sh/release-namespace=kamaji-system \
          --overwrite 2>/dev/null || true
        kubectl label datastore default \
          app.kubernetes.io/managed-by=Helm \
          --overwrite 2>/dev/null || true
      when: kamaji_check.rc != 0

    - name: Install Kamaji
      shell: |
        helm install kamaji clastix/kamaji \
          --namespace kamaji-system \
          --create-namespace \
          --version 0.0.0+latest \
          --wait
      when: kamaji_check.rc != 0

- name: Install Kamaji CAPI Control Plane Provider
  hosts: servers[0]
  become: true
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  tasks:
    - name: Check if Kamaji CAPI provider is already installed
      shell: kubectl get deployment -n kamaji-system kamaji-cluster-api-control-plane-provider 2>/dev/null
      register: kamaji_capi_check
      failed_when: false
      changed_when: false

    - name: Install Kamaji CAPI Control Plane Provider
      shell: |
        kubectl apply -f https://github.com/clastix/cluster-api-control-plane-provider-kamaji/releases/latest/download/control-plane-components.yaml
      when: kamaji_capi_check.rc != 0
