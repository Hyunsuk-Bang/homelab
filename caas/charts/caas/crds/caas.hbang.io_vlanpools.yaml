---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.0
  name: vlanpools.caas.hbang.io
spec:
  group: caas.hbang.io
  names:
    kind: VLANPool
    listKind: VLANPoolList
    plural: vlanpools
    shortNames:
    - vlp
    singular: vlanpool
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.vlanRange.start
      name: VLAN-Start
      type: integer
    - jsonPath: .spec.vlanRange.end
      name: VLAN-End
      type: integer
    - jsonPath: .spec.pods
      name: Pods
      type: string
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: VLANPool is the Schema for the vlanpools API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              VLANPoolSpec is admin-managed config defining the allocatable VLAN range and how
              per-cluster node networks are derived. Normally a single VLANPool named "default".
            properties:
              controlPlane:
                description: |-
                  ControlPlaneNetwork describes management-side networking for tenant control
                  planes (Kamaji) and Proxmox.
                properties:
                  bgpPool:
                    description: |-
                      BGPPool is the Cilium LoadBalancer pool on the management network from which
                      each Kamaji TenantControlPlane VIP is drawn. Informational.
                    type: string
                  bridge:
                    default: vmbr0
                    description: Bridge is the vlan-aware Proxmox bridge worker NICs
                      attach to.
                    type: string
                required:
                - bridge
                type: object
              dns:
                items:
                  type: string
                type: array
              nodeNetwork:
                description: |-
                  NodeNetwork describes how a cluster's node subnet is derived from its VLAN.
                  The node subnet is a pure function of the VLAN: <base>.<vlan>.0.0/<prefix>.
                properties:
                  base:
                    default: 10
                    description: Base is the first octet of every node subnet (e.g.
                      10 => 10.<vlan>.0.0/16).
                    type: integer
                  gatewayHostIndex:
                    default: 1
                    description: |-
                      GatewayHostIndex is the host octet of the gateway (an SVI on the external
                      switch), e.g. 1 => 10.<vlan>.0.1.
                    type: integer
                  hostRange:
                    description: HostRange bounds the worker VM IPs handed to capmox
                      within <base>.<vlan>.0.0/24.
                    properties:
                      end:
                        maximum: 254
                        minimum: 2
                        type: integer
                      start:
                        maximum: 254
                        minimum: 2
                        type: integer
                    required:
                    - end
                    - start
                    type: object
                  prefix:
                    default: 16
                    description: Prefix is the CIDR prefix length of each cluster's
                      node subnet.
                    type: integer
                required:
                - base
                - gatewayHostIndex
                - hostRange
                - prefix
                type: object
              pods:
                default: 10.244.0.0/16
                description: |-
                  Pods is the pod CIDR every tenant uses. Reused across tenants: different VLANs
                  are not routed together, so identical pod CIDRs never collide.
                type: string
              services:
                default: 10.96.0.0/16
                description: Services is the service CIDR every tenant uses (reused,
                  same reasoning as Pods).
                type: string
              vlanRange:
                description: VLANRange is an inclusive range of allocatable VLAN IDs.
                properties:
                  end:
                    maximum: 4094
                    minimum: 1
                    type: integer
                  start:
                    maximum: 4094
                    minimum: 1
                    type: integer
                required:
                - end
                - start
                type: object
            required:
            - controlPlane
            - nodeNetwork
            - pods
            - services
            - vlanRange
            type: object
          status:
            description: VLANPoolStatus mirrors allocation state for observability.
            properties:
              allocatedVLANs:
                description: AllocatedVLANs is the set of VLAN IDs currently claimed
                  by TenantClusters.
                items:
                  type: integer
                type: array
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
