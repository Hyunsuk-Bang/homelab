---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.0
  name: tenantclusters.caas.hbang.io
spec:
  group: caas.hbang.io
  names:
    kind: TenantCluster
    listKind: TenantClusterList
    plural: tenantclusters
    shortNames:
    - tc
    singular: tenantcluster
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.allocation.vlan
      name: VLAN
      type: integer
    - jsonPath: .status.controlPlaneEndpoint
      name: Endpoint
      type: string
    - jsonPath: .status.observedWorkers.ready
      name: Workers
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: TenantCluster is the Schema for the tenantclusters API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: TenantClusterSpec is the user's intent for a cluster.
            properties:
              cni:
                description: CNISpec selects the CNI installed into the tenant cluster
                  (Phase 2).
                properties:
                  type:
                    default: cilium
                    enum:
                    - none
                    - cilium
                    type: string
                type: object
              controlPlane:
                description: ControlPlaneSpec configures the Kamaji hosted control
                  plane.
                properties:
                  replicas:
                    default: 3
                    format: int32
                    minimum: 1
                    type: integer
                required:
                - replicas
                type: object
              kubernetesVersion:
                default: v1.34.3
                type: string
              poolRef:
                description: PoolRef references the VLANPool to allocate from.
                properties:
                  name:
                    default: default
                    type: string
                required:
                - name
                type: object
              sshAuthorizedKeys:
                items:
                  type: string
                type: array
              workers:
                items:
                  description: |-
                    WorkerPool is one MachineDeployment's worth of Proxmox worker VMs, pinned to a
                    Proxmox source node and image template.
                  properties:
                    cores:
                      default: 4
                      type: integer
                    diskGiB:
                      default: 100
                      type: integer
                    memoryMiB:
                      default: 16384
                      type: integer
                    name:
                      description: Name is the pool name; used to name the MachineDeployment
                        and templates.
                      type: string
                    replicas:
                      default: 1
                      format: int32
                      minimum: 0
                      type: integer
                    sourceNode:
                      description: SourceNode is the Proxmox node the template lives
                        on / VMs are cloned to.
                      type: string
                    templateID:
                      description: TemplateID is the Proxmox VMID of the pre-baked
                        image template.
                      type: integer
                  required:
                  - cores
                  - diskGiB
                  - memoryMiB
                  - name
                  - replicas
                  - sourceNode
                  - templateID
                  type: object
                minItems: 1
                type: array
