                description: |-
                  Allocation is the network claim made for this cluster. VLAN is the only quantity
                  allocated; the rest is derived from it (and from the VLANPool constants).
                properties:
                  gateway:
                    type: string
                  hostRange:
                    type: string
                  nodeSubnet:
                    type: string
                  podCIDR:
                    type: string
