# This rule is not used by the project caas itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the caas.hbang.io.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: caas
    app.kubernetes.io/managed-by: kustomize
  name: tenantcluster-editor-role
rules:
- apiGroups:
  - caas.hbang.io
  resources:
  - tenantclusters
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - caas.hbang.io
  resources:
  - tenantclusters/status
  verbs:
  - get
